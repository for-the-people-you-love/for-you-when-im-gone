<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For You When I'm Gone</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background:
    radial-gradient(circle at top, rgba(255,220,170,0.08), transparent 30%),
    linear-gradient(to bottom, #2b1d14, #120d09);
  min-height: 100vh;
  color: white;
}

/* ---------- STAGE ---------- */
.open-wrap {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ---------- BOOK ---------- */
.open-book {
  width: 920px;
  height: 640px;
  display: grid;
  grid-template-columns: 1fr 20px 1fr;
  box-shadow: 0 24px 60px rgba(0,0,0,0.45);
}

/* ---------- LEFT PAGE ---------- */
.left-page {
  background:
    linear-gradient(to right, #f0dfc3 0%, #fbf4e8 10%, #fffaf2 100%);
  border: 4px solid #d6bb90;
  border-right: none;
  border-radius: 22px 0 0 22px;
  position: relative;
}

/* CONTROLS */
.left-controls {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 16px;
  text-align: right;
}

.left-controls div {
  font-size: 14px;
  color: #7b4e2f;
  cursor: pointer;
}

.left-controls div:hover {
  color: #c7964b;
}

/* ---------- SPINE ---------- */
.spine {
  background:
    linear-gradient(to right, #6f5130, #d8c29c 40%, #6f5130 70%, #4a341f);
}

/* ---------- RIGHT PAGE ---------- */
.right-page {
  background:
    linear-gradient(to right, #f0dfc3 0%, #fbf4e8 10%, #fffaf2 100%);
  color: #4a2d1a;
  border: 4px solid #d6bb90;
  border-left: none;
  border-radius: 0 22px 22px 0;
  padding: 20px;
  overflow: hidden;
}

.page-panel { display: none; }

/* ---------- TEXT ---------- */
h1 {
  margin: 0 0 10px 0;
  font-size: 26px;
}

.index-list {
  display: grid;
  gap: 8px;
}

.index-link {
  background: rgba(255,255,255,0.75);
  border: 1px solid rgba(199,150,75,0.45);
  border-radius: 8px;
  padding: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="open-wrap">
  <div class="open-book">

    <!-- LEFT PAGE -->
    <div class="left-page">
      <div class="left-controls">
        <div onclick="closeBook()">Close Book</div>
        <div onclick="addPage()">+ New Page</div>
        <div onclick="flipBack()">Flip Back</div>
        <div onclick="goToIndex()">Index</div>
        <div onclick="nextChapter()">Next Chapter</div>
      </div>
    </div>

    <!-- SPINE -->
    <div class="spine"></div>

    <!-- RIGHT PAGE -->
    <div class="right-page">

      <!-- INDEX -->
      <div id="page0" class="page-panel">
        <h1>Book Index</h1>
        <div class="index-list">
          <div class="index-link" onclick="goToPage(1)">Chapter 1 — About You</div>
          <div class="index-link" onclick="goToPage(2)">Chapter 2 — Father</div>
          <div class="index-link" onclick="goToPage(3)">Chapter 3 — Mother</div>
        </div>
      </div>

      <!-- SAMPLE PAGE -->
      <div id="page1" class="page-panel">
        <h1>About You</h1>
        <p>Your story goes here.</p>
      </div>

      <div id="page2" class="page-panel">
        <h1>Father</h1>
        <p>Father story.</p>
      </div>

      <div id="page3" class="page-panel">
        <h1>Mother</h1>
        <p>Mother story.</p>
      </div>

    </div>
  </div>
</div>

<script>
let currentPage = 0;

function showPage(n) {
  document.querySelectorAll(".page-panel").forEach(p => p.style.display = "none");
  document.getElementById("page" + n).style.display = "block";
  currentPage = n;
}

function goToPage(n) { showPage(n); }
function goToIndex() { showPage(0); }

function nextChapter() {
  currentPage++;
  if (document.getElementById("page" + currentPage)) {
    showPage(currentPage);
  }
}

function flipBack() {
  if (currentPage > 0) showPage(currentPage - 1);
}

function addPage() {
  alert("Add page function (we hook this back next)");
}

function closeBook() {
  alert("Close book (we reconnect this next)");
}

showPage(0);
</script>

</body>
</html>
