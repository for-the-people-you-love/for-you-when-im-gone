<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For You When I'm Gone</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  overflow: hidden;
}

/* ===== MARBLE BACKGROUND (OPTION A) ===== */
body {
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.15), transparent 40%),
    linear-gradient(135deg, #7fb3d5, #2e86c1);
  background-blend-mode: overlay;
}

/* ===== CLOSED BOOK STAGE ===== */
#closedStage {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: flex-end; /* push book to right */
  align-items: center;
  padding-right: 5%;
}

/* ===== BOOK IMAGE ===== */
.book {
  width: 45vw; /* THIS is your 50% bigger feel */
  max-width: 700px;
  cursor: pointer;
  transition: transform 0.3s ease;
}

.book:hover {
  transform: scale(1.03);
}
</style>
</head>

<body>

<!-- CLOSED BOOK -->
<div id="closedStage">
  <img src="book.jpg" class="book" onclick="openBook()" />
</div>

<script>
function openBook() {
  document.body.innerHTML = `
    <div style="
      width:100vw;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family: Georgia, serif;
    ">
      <div style="
        width:90vw;
        height:80vh;
        display:flex;
        box-shadow:0 20px 50px rgba(0,0,0,0.3);
      ">
        
        <!-- LEFT (BACK OF PAGES) -->
        <div style="
          width:50%;
          background:#5a3e2b;
        "></div>

        <!-- RIGHT (ACTIVE PAGE) -->
        <div style="
          width:50%;
          background:#f4f1ea;
          padding:40px;
          color:#3e2a1f;
        ">
          <h1>Book Index</h1>

          <p>Chapter 1 — About You</p>
          <p>Chapter 2 — Father</p>
          <p>Chapter 3 — Mother</p>

          <br><br>
          <button onclick="location.reload()">Close Book</button>
        </div>

      </div>
    </div>
  `;
}
</script>

</body>
</html>
